# -----------------------------------------------------------------------------
# RHOAI Instance Helm Chart - Comprehensive values
# Red Hat OpenShift AI: DSCInitialization, DataScienceCluster, OdhDashboardConfig,
# HardwareProfile(s)
# -----------------------------------------------------------------------------

# Common ODH applications namespace (dashboard, hardware profiles, etc.)
odhApplicationsNamespace: redhat-ods-applications

# --- Feature toggles (drive component managementState and dashboard visibility) ---
featureStore: false         # Feast operator
# modelsAsService MUST remain false during Phase 3 (RHOAI install).
# The MaaS component (maas-api pod) depends on the MaaS gateway being present first.
# Enabling it before the gateway is created leaves the DataScienceCluster Not Ready
# (modelsasservice component stuck) and the maas-api pod never starts.
# Enable it in Phase 5 (MaaS) by re-applying: helm template rhoai ./gitops/instance/rhoai --set modelsAsService=true | oc apply -f -
modelsAsService: false     # KServe models-as-service — enable in Phase 5 (MaaS), not here
distributedWorkloads: false # Distributed workloads
kueue: false                 # Kueue operator
llamaStack: true            # LlamaStack operator
modelRegistry: true         # Model registry + dashboard menu
mlflow: true                # MLflow operator + MLflow instance CR
trustyai: false             # TrustyAI

# --- DSCInitialization (dsci) ---
# Only a few overrides; rest matches original defaults.
dsci:
  name: default-dsci
  # applicationsNamespace defaults to odhApplicationsNamespace when set
  monitoringNamespace: redhat-ods-monitoring
  serviceMeshState: Removed  # or Managed if using service mesh

# --- DataScienceCluster (dsc) ---
# Only a few overrides; component states come from feature toggles above.
dsc:
  name: default-dsc
  workbenchNamespace: rhods-notebooks      # optional
  modelRegistryNamespace: rhoai-model-registries  # optional

# --- OdhDashboardConfig ---
# Only a few overrides; disableDistributedWorkloads/disableModelRegistry follow feature toggles above.
odhDashboardConfig:
  name: odh-dashboard-config
  # namespace defaults to odhApplicationsNamespace
  adminGroups: rhods-admins
  allowedGroups: system:authenticated
  notebookNamespace: rhods-notebooks
  pvcSize: 20Gi

# --- MLflow instance (only created when mlflow: true) ---
mlflowInstance:
  name: mlflow
  # namespace defaults to odhApplicationsNamespace
  storage:
    accessModes:
      - ReadWriteOnce
    storageSize: 10Gi
  backendStoreUri: "sqlite:////mlflow/mlflow.db"
  artifactsDestination: "file:///mlflow/artifacts"
  serveArtifacts: true

# --- HardwareProfile(s) for workbenches / dashboard ---
hardwareProfiles:
  enabled: true
  # Per profile: scheduling is optional; if set, use scheduling.kueue (Queue) or scheduling.node (Node).
  # Node example:
  #   scheduling:
  #     node:
  #       nodeSelector: {}
  #       tolerations: [{ effect: NoSchedule, key: nvidia.com/gpu, operator: Exists }]
  # namespace is odhApplicationsNamespace (common to all profiles)
  profiles:
    - name: gpu-profile
      displayName: gpu-profile
      description: "Generic GPU profile — GPU toleration only, no Kueue, no product nodeSelector. Works with any NVIDIA GPU when Kueue is not installed."
      disabled: false
      dashboardFeatureVisibility: "[]"
      identifiers:
        - defaultCount: "1"
          displayName: CPU
          identifier: cpu
          maxCount: "8"
          minCount: 1
          resourceType: CPU
        - defaultCount: 12Gi
          displayName: Memory
          identifier: memory
          maxCount: 32Gi
          minCount: 1Gi
          resourceType: Memory
        - defaultCount: 1
          displayName: GPU
          identifier: nvidia.com/gpu
          maxCount: 4
          minCount: 1
          resourceType: Accelerator
      scheduling:
        node:
          tolerations:
            - effect: NoSchedule
              key: nvidia.com/gpu
              operator: Exists
    - name: gpu-kueue-profile
      displayName: gpu-kueue-profile
      description: "GPU profile with Kueue LocalQueue scheduling. Only visible when kueue: true and a matching LocalQueue named 'default' exists in the workload namespace."
      disabled: false
      dashboardFeatureVisibility: "[]"
      identifiers:
        - defaultCount: "1"
          displayName: CPU
          identifier: cpu
          maxCount: "8"
          minCount: 1
          resourceType: CPU
        - defaultCount: 12Gi
          displayName: Memory
          identifier: memory
          maxCount: 32Gi
          minCount: 1Gi
          resourceType: Memory
        - defaultCount: 1
          displayName: GPU
          identifier: nvidia.com/gpu
          maxCount: 4
          minCount: 1
          resourceType: Accelerator
      scheduling:
        kueue:
          localQueueName: default
          priorityClass: "None"
        node:
          tolerations:
            - effect: NoSchedule
              key: nvidia.com/gpu
              operator: Exists
    - name: nvidia-a10g-profile
      displayName: nvidia-a10g-profile
      description: "A10G-specific GPU profile — targets nodes labelled nvidia.com/gpu.product: NVIDIA-A10G. Use when the cluster has mixed GPU types and you need to pin to A10G nodes."
      disabled: false
      dashboardFeatureVisibility: "[]"
      identifiers:
        - defaultCount: "1"
          displayName: CPU
          identifier: cpu
          maxCount: "8"
          minCount: 1
          resourceType: CPU
        - defaultCount: 12Gi
          displayName: Memory
          identifier: memory
          maxCount: 32Gi
          minCount: 1Gi
          resourceType: Memory
        - defaultCount: 1
          displayName: GPU
          identifier: nvidia.com/gpu
          maxCount: 4
          minCount: 1
          resourceType: Accelerator
      scheduling:
        node:
          nodeSelector:
            nvidia.com/gpu.product: NVIDIA-A10G
          tolerations:
            - effect: NoSchedule
              key: nvidia.com/gpu
              operator: Exists
