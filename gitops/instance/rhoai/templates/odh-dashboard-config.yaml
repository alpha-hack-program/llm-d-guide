---
apiVersion: opendatahub.io/v1alpha
kind: OdhDashboardConfig
metadata:
  labels:
    app: rhods-dashboard
    app.kubernetes.io/part-of: rhods-dashboard
    app.opendatahub.io/rhods-dashboard: 'true'
    platform.opendatahub.io/part-of: dashboard
  name: {{ .Values.odhDashboardConfig.name | default "odh-dashboard-config" }}
  namespace: {{ .Values.odhDashboardConfig.namespace | default .Values.odhApplicationsNamespace | default "redhat-ods-applications" }}
spec:
  dashboardConfig:
    disableAdminConnectionTypes: false
    disableBYONImageStream: false
    disableClusterManager: false
    disableCustomServingRuntimes: false
    disableDistributedWorkloads: {{ not (.Values.distributedWorkloads | default false) }}
    disableHome: false
    disableInfo: false
    disableISVBadges: false
    disableKServe: false
    disableKServeAuth: false
    disableKServeMetrics: false
    disableKServeRaw: false
    disableKueue: false
    disableLMEval: false
    disableModelCatalog: false
    disableModelMesh: false
    disableModelRegistry: {{ not (.Values.modelRegistry | default false) }}
    disableModelRegistrySecureDB: false
    disableModelServing: false
    disableNIMModelServing: false
    disablePerformanceMetrics: false
    disablePipelines: false
    disableProjectScoped: false
    disableProjectSharing: false
    disableProjects: false
    disableServingRuntimeParams: false
    disableStorageClasses: false
    disableSupport: false
    disableTracking: false
    disableTrustyBiasMetrics: false
    disableUserManagement: false
    enablement: true
    genAiStudio: true
    modelAsService: true
    mlflow: {{ if (.Values.mlflow | default false) }}true{{ else }}false{{ end }}
  groupsConfig:
    adminGroups: {{ .Values.odhDashboardConfig.adminGroups | default "rhods-admins" }}
    allowedGroups: {{ .Values.odhDashboardConfig.allowedGroups | default "system:authenticated" }}
  modelServerSizes:
  - name: Small
    resources:
      limits: { cpu: "2", memory: 8Gi }
      requests: { cpu: "1", memory: 4Gi }
  - name: Medium
    resources:
      limits: { cpu: "8", memory: 10Gi }
      requests: { cpu: "4", memory: 8Gi }
  - name: Large
    resources:
      limits: { cpu: "10", memory: 20Gi }
      requests: { cpu: "6", memory: 16Gi }
  notebookController:
    enabled: true
    notebookNamespace: {{ .Values.odhDashboardConfig.notebookNamespace | default "rhods-notebooks" }}
    pvcSize: {{ .Values.odhDashboardConfig.pvcSize | default "20Gi" }}
  notebookSizes:
  - name: Small
    resources:
      limits: { cpu: "2", memory: 8Gi }
      requests: { cpu: "1", memory: 8Gi }
  - name: Medium
    resources:
      limits: { cpu: "6", memory: 24Gi }
      requests: { cpu: "3", memory: 24Gi }
  - name: Large
    resources:
      limits: { cpu: "14", memory: 56Gi }
      requests: { cpu: "7", memory: 56Gi }
  - name: X Large
    resources:
      limits: { cpu: "30", memory: 120Gi }
      requests: { cpu: "15", memory: 120Gi }
  templateDisablement: []
  templateOrder: []
