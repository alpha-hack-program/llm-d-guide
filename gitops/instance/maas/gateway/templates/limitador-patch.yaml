{{- if .Values.limitador.exhaustiveTelemetry }}
apiVersion: limitador.kuadrant.io/v1alpha1
kind: Limitador
metadata:
  name: limitador
  namespace: kuadrant-system
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  # Emit per-limit-name labels on all Limitador metrics (not only on rate-limited calls).
  telemetry: exhaustive
{{- end }}
