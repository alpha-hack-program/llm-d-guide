{{- if .Values.gateway.enabled }}
{{- if and .Values.useOpenShiftRoute (not (and .Values.tls.secretName .Values.tls.generate)) }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.gateway.name }}-override-config
  namespace: {{ .Values.gateway.namespace }}
data:
  service: |
    ## serving-cert-secret-name removed: the service-ca-operator may overwrite
    ## an existing cert (ingress-certs, router-certs-default) with an internal-only
    ## cert, breaking external TLS. The Gateway listener's certificateRefs is sufficient.
    # metadata:
    #   annotations:
    #     service.beta.openshift.io/serving-cert-secret-name: "{{ .Values.tls.secretName }}"
    spec:
      type: ClusterIP
{{- end }}
{{- if and .Values.tls.secretName .Values.tls.generate }}
---
{{- if eq .Values.tls.issuerName "selfsigned" }}
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: {{ .Values.gateway.name }}-selfsigned-issuer
  namespace: {{ .Values.gateway.namespace }}
spec:
  selfSigned: {}
---
{{- end }}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Values.gateway.name }}-serving-cert
  namespace: {{ .Values.gateway.namespace }}
spec:
  dnsNames:
  {{- if eq .Values.tls.issuerName "selfsigned" }}
  - {{ .Values.gateway.name }}-{{ .Values.gateway.className }}.{{ .Values.gateway.namespace }}.svc
  - {{ .Values.gateway.name }}-{{ .Values.gateway.className }}.{{ .Values.gateway.namespace }}.svc.cluster.local
  {{- end }}
  {{- if .Values.useOpenShiftRoute }}
  - {{ .Values.gateway.name }}-{{ .Values.gateway.namespace }}.{{ .Values.clusterDomain }}
  {{- else }}
  - {{ .Values.subdomain }}.{{ .Values.clusterDomain }}
  {{- end }}
  issuerRef:
  {{- if eq .Values.tls.issuerName "selfsigned" }}
    group: cert-manager.io
    kind: Issuer
    name: {{ .Values.gateway.name }}-selfsigned-issuer
  {{- else if eq .Values.tls.issuerName "letsencrypt" }}
    group: cert-manager.io
    kind: ClusterIssuer
    name: letsencrypt
  {{- else if eq .Values.tls.issuerName "local-ca" }}
    group: cert-manager.io
    kind: ClusterIssuer
    name: local-ca
  {{- else }}
    kind: Issuer
    name: {{ .Values.tls.issuerName }}
  {{- end }}
  secretName: {{ .Values.tls.secretName }}
{{- end }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ .Values.gateway.name }}
  namespace: {{ .Values.gateway.namespace }}
  annotations:
    opendatahub.io/managed: "false"
    security.opendatahub.io/authorino-tls-bootstrap: "true"
    networking.istio.io/service-type: {{ .Values.gateway.serviceType | default "ClusterIP" }}
spec:
  gatewayClassName: {{ .Values.gateway.className }}
  {{- if and .Values.useOpenShiftRoute (not (and .Values.tls.secretName .Values.tls.generate)) }}
  infrastructure:
    parametersRef:
      group: ""
      kind: ConfigMap
      name: {{ .Values.gateway.name }}-override-config
  {{- end }}
  listeners:
  {{- if .Values.tls.secretName }}
  - name: https
    hostname: "{{ .Values.subdomain }}.{{ .Values.clusterDomain }}"
    port: 443
    protocol: HTTPS
    tls:
      mode: Terminate
      certificateRefs:
      - group: ""
        kind: Secret
        name: {{ .Values.tls.secretName }}
    allowedRoutes:
      namespaces:
        from: Selector
        selector:
          matchExpressions:
          - key: kubernetes.io/metadata.name
            operator: In
            values:
            - {{ .Values.gateway.namespace }}
            - redhat-ods-applications
            - models-as-a-service
            {{- range .Values.gateway.modelNamespaces }}
            - {{ . }}
            {{- end }}
  {{- else }}
  - name: http
    hostname: "{{ .Values.subdomain }}.{{ .Values.clusterDomain }}"
    port: 80
    protocol: HTTP
    allowedRoutes:
      namespaces:
        from: Selector
        selector:
          matchExpressions:
          - key: kubernetes.io/metadata.name
            operator: In
            values:
            - {{ .Values.gateway.namespace }}
            - redhat-ods-applications
            - models-as-a-service
            {{- range .Values.gateway.modelNamespaces }}
            - {{ . }}
            {{- end }}
  {{- end }}
{{- end }}
