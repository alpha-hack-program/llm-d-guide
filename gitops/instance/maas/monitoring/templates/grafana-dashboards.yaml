{{- if .Values.grafana.enabled }}
---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: maas-platform-overview
  namespace: {{ .Values.grafana.namespace }}
  annotations:
    argocd.argoproj.io/compare-options: IgnoreExtraneous
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
  labels:
    {{- toYaml .Values.grafana.instanceSelector | nindent 4 }}
spec:
  instanceSelector:
    matchLabels:
      {{- toYaml .Values.grafana.instanceSelector | nindent 6 }}
  json: |
    {{ .Files.Get "dashboards/platform-overview.json" | nindent 4 }}
---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: maas-tier-usage
  namespace: {{ .Values.grafana.namespace }}
  annotations:
    argocd.argoproj.io/compare-options: IgnoreExtraneous
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
  labels:
    {{- toYaml .Values.grafana.instanceSelector | nindent 4 }}
spec:
  instanceSelector:
    matchLabels:
      {{- toYaml .Values.grafana.instanceSelector | nindent 6 }}
  json: |
    {{ .Files.Get "dashboards/tier-usage.json" | nindent 4 }}
---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: maas-vllm-metrics
  namespace: {{ .Values.grafana.namespace }}
  annotations:
    argocd.argoproj.io/compare-options: IgnoreExtraneous
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
  labels:
    {{- toYaml .Values.grafana.instanceSelector | nindent 4 }}
spec:
  instanceSelector:
    matchLabels:
      {{- toYaml .Values.grafana.instanceSelector | nindent 6 }}
  json: |
    {{ .Files.Get "dashboards/vllm-metrics.json" | nindent 4 }}
{{- end }}
