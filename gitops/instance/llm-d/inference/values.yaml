# Deployment type (required; chart fails if not one of these):
# - intelligent-inference:  single pool with full EPP scheduler (prefix-cache, queue, kv-cache scoring)
# - pd-disaggregation:     split prefill + decode pools, NixlConnector KV transfer
#
# This value is automatically added as a label (llm-d.ai/well-lit-path) to the
# LLMInferenceService, which enables:
# - Dashboard filtering by architecture type
# - Correct metrics interpretation (cache hit rate for intelligent-inference, KV transfer for P/D)
# - ServiceMonitor label propagation to Prometheus metrics
deploymentType: intelligent-inference

# When true and deploymentType is intelligent-inference: use minimal scheduler {} and
# startupProbe when useStartupProbe is true (gpt-oss-20b style). When false: full EPP scheduler.
intelligentInferenceSimple: false

# ── Hardware profile ──────────────────────────────────────────────────────────
# Auto-selected based on gpuCount: "gpu-profile" when GPU, "default-cpu" otherwise.
# Override name to force a specific profile.
# Available profiles: gpu-profile, default-cpu, nvidia, nvidiaa10g-profile, default-profile
hardwareProfile:
  namespace: redhat-ods-applications
  name: ""

# ── Scheduler (EPP) TLS ───────────────────────────────────────────────────────
# By default the EPP uses a self-signed certificate (--cert-path is not set).
# To use your own TLS certificates (e.g. from cert-manager):
#   1. Create a Secret with keys tls.crt and tls.key in the same namespace.
#   2. Set schedulerTLS.enabled to true and schedulerTLS.secretName to that secret.
schedulerTLS:
  enabled: false
  secretName: ""
  mountPath: /etc/epp/tls

# ── Identity ──────────────────────────────────────────────────────────────────
# Name of the LLMInferenceService (also used as PVC name when storage.pvc is set)
serviceName: my-model

# Runtime
runtime:
  version: v0.18.0
  displayName: llm-d

# Number of decode / main replicas
replicas: 1

# ── Model ─────────────────────────────────────────────────────────────────────
model:
  name: ""

# ── Storage ───────────────────────────────────────────────────────────────────
# type:
#   hf  – pull from HuggingFace Hub (uri: hf://org/model)
#   oci – pull from an OCI/ModelCar image  (uri: oci://registry/repo:tag)
#
# Optionally add a pvc section to cache the model locally across restarts:
#   pvc:
#     size: 40Gi
#     accessMode: ReadWriteOnce
# storage:
#   type: hf
#   uri: hf://facebook/opt-125m

# ── Resources (decode / main container) ──────────────────────────────────────
# Set gpuCount to request an NVIDIA GPU; omit it for CPU-only nodes.
resources:
  limits:
    cpu: "1"
    memory: 8Gi
    # gpuCount: "1"
  requests:
    cpu: "1"
    memory: 8Gi
    # gpuCount: "1"

# ── Container images ──────────────────────────────────────────────────────────
# Auto-selected: GPU image when resources.*.gpuCount is set, CPU image otherwise.
# Set override to force a specific image regardless of gpuCount.
images:
  gpu: "registry.redhat.io/rhaii/vllm-cuda-rhel9@sha256:ad06abf3bb5235ebb5b2df84cd1b9fd09e823f0ff2eebfc82bb4590275ccfe0b"
  cpu: "registry.redhat.io/rhaii/vllm-cpu-rhel9@sha256:dd104214095322ca92fb71149ae2bea8cfff54d6d261079740f673a840ed0795"
  override: ""

# ── CPU-specific vLLM settings ────────────────────────────────────────────────
# Applied automatically as env vars when no gpuCount is set. Ignored for GPU deployments.
cpu:
  kvCacheSpaceGiB: 4  # VLLM_CPU_KVCACHE_SPACE — GiB reserved for KV cache (default ~15 GiB causes OOM on small nodes)
  skipWarmup: true    # VLLM_SKIP_WARMUP — skip Inductor compilation warmup; faster restarts at the cost of first-token latency

# ── vLLM configuration ────────────────────────────────────────────────────────
# Structured vLLM settings: framework-managed flags + user extras
vllm:
  # Prefix caching configuration (critical for intelligent-inference)
  # Modes:
  #   "auto" (default) - Enabled for intelligent-inference, disabled for P/D
  #   true             - Always enabled (all deployment types)
  #   false            - Always disabled (not recommended for intelligent-inference)
  prefixCaching:
    enabled: auto

  # User-specific vLLM flags (appended after framework-managed flags)
  # Example:
  #   extraArgs:
  #     - "--disable-uvicorn-access-log"
  #     - "--enable-auto-tool-choice"
  #     - "--tool-call-parser=hermes"
  extraArgs: []

# ── Extra env vars ────────────────────────────────────────────────────────────
# Appended to the main container after any auto-injected CPU env vars above.
# Use this for tracing, HF tokens, and anything not covered by vllmAdditionalArgs.
env: []
# env:
#   - name: HF_TOKEN
#     valueFrom:
#       secretKeyRef:
#         name: hf-token
#         key: token

# ── Monitoring ────────────────────────────────────────────────────────────────
# When enabled: creates a ServiceMonitor in the same namespace to scrape vLLM metrics.
# The ServiceMonitor is picked up by OpenShift User Workload Monitoring (Prometheus).
#
# IMPORTANT: User Workload Monitoring must be enabled on the cluster:
#   oc get configmap cluster-monitoring-config -n openshift-monitoring \
#     -o jsonpath='{.data.config\.yaml}' | grep enableUserWorkload
#
# Well-lit path label is automatically propagated from deploymentType to metrics.
monitoring:
  enabled: true  # Default: ON (disable for air-gapped or non-monitored environments)
  serviceMonitor:
    interval: 30s       # How often to scrape metrics
    scrapeTimeout: 10s  # Timeout for each scrape

# ── MaaS integration ──────────────────────────────────────────────────────────
# When enabled: sets enable-auth to true, routes traffic through the MaaS gateway,
# and creates a MaaSModelRef so the model appears in the subscription management UI.
# Access control is managed by MaaSSubscription + MaaSAuthPolicy CRDs in the
# models-as-a-service namespace — create those separately after deploying the model.
maas:
  enabled: false
  gateway:
    name: maas-default-gateway
    namespace: openshift-ingress

# ── Auth ──────────────────────────────────────────────────────────────────────
# Overridden to true automatically when maas.enabled is set.
enableAuth: false

# ── Liveness / startup probe ─────────────────────────────────────────────────
# When useStartupProbe is true: emit startupProbe + minimal livenessProbe.
# Otherwise use the full livenessProbe below.
useStartupProbe: false
decodeStartupProbePort: 8001
mainStartupProbePort: 8000
startupProbe:
  initialDelaySeconds: 15
  timeoutSeconds: 10
  periodSeconds: 10
  failureThreshold: 60

livenessProbe:
  path: /health
  port: 8000
  initialDelaySeconds: 120
  periodSeconds: 30
  timeoutSeconds: 30
  failureThreshold: 5

# ── Intelligent-inference: scheduler (EPP) config ────────────────────────────
scheduler:
  hashBlockSize: 64
  maxPrefixBlocksToMatch: 256
  lruCapacityPerServer: 39744

# ── PD disaggregation: prefill pool ──────────────────────────────────────────
prefill:
  replicas: 1
  resources:
    limits:
      cpu: "4"
      memory: 8Gi
      gpuCount: "1"
    requests:
      cpu: "4"
      memory: 8Gi
      gpuCount: "1"
  livenessProbe:
    path: /health
    port: 8000
    initialDelaySeconds: 120
    periodSeconds: 30
    timeoutSeconds: 30
    failureThreshold: 5

# ── PD disaggregation: scheduler (EPP) config ────────────────────────────────
pdScheduler:
  threshold: 30000
  maxNumOfEndpoints: 1

# ── PD disaggregation: NixlConnector KV transfer config ──────────────────────
kvTransfer:
  blockSize: 128
  abortRequestTimeout: "100000"
  loggingLevel: "DEBUG"
  vllmArgsOrder: "uvicorn_first"
  envOrder: "gpt_first"
