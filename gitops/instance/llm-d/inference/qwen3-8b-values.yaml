deploymentType: intelligent-inference
serviceName: qwen3-8b
# replicas: 2 assumes 3-AZ clusters with 1 GPU node per AZ (3 total).
# Single-AZ / single GPU node clusters: override with --set replicas=1 on helm template.
replicas: 2

updateStrategy: Recreate

model:
  name: alibaba/qwen3-8b

storage:
  type: oci
  uri: oci://registry.redhat.io/rhelai1/modelcar-qwen3-8b-fp8-dynamic:1.5

resources:
  limits:
    cpu: "6"
    memory: 24Gi
    gpuCount: "1"
  requests:
    cpu: "6"
    memory: 24Gi
    gpuCount: "1"

hardwareProfile:
  namespace: redhat-ods-applications
  name: gpu-profile

vllmAdditionalArgs: "--disable-uvicorn-access-log --enable-auto-tool-choice --tool-call-parser hermes"

# Enable maas: true only after completing Phase 6 (MaaS gateway + Kuadrant policies).
# Setting it true here before the MaaS stack is in place causes maas-controller reconcile
# errors and does not enable MaaS — it must be toggled after the gateway is ready.
maas:
  enabled: false
