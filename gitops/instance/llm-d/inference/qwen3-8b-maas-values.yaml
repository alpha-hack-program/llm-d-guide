deploymentType: intelligent-inference
serviceName: qwen3-8b-maas
replicas: 1

model:
  name: alibaba/Qwen3-8B

storage:
  type: oci
  uri: oci://registry.redhat.io/rhelai1/modelcar-qwen3-8b-fp8-dynamic:1.5

resources:
  limits:
    cpu: "6"
    memory: 24Gi
    gpuCount: "1"
  requests:
    cpu: "6"
    memory: 24Gi
    gpuCount: "1"

hardwareProfile:
  namespace: redhat-ods-applications
  name: gpu-profile

vllm:
  prefixCaching:
    enabled: auto  # Auto-enabled for intelligent-inference
  extraArgs:
    - "--disable-uvicorn-access-log"
    - "--enable-auto-tool-choice"
    - "--tool-call-parser=hermes"

# MaaS integration enabled
maas:
  enabled: true
  gateway:
    name: maas-default-gateway
    namespace: openshift-ingress
