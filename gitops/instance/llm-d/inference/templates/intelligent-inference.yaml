{{- include "inference.validateDeploymentType" . }}
{{- include "inference.validateStorageType" . }}

{{- if eq .Values.deploymentType "intelligent-inference" }}
{{- if not .Values.storage }}
{{- fail "intelligent-inference requires values.storage to be set" }}
{{- end }}
{{- if not .Values.storage.uri }}
{{- fail "intelligent-inference requires values.storage.uri to be set" }}
{{- end }}

{{- /* ── Derived booleans ─────────────────────────────────────────────────── */}}
{{- $isGPU := false }}
{{- if or .Values.resources.limits.gpuCount .Values.resources.requests.gpuCount }}
  {{- $isGPU = true }}
{{- end }}

{{- /* ── Image auto-selection ─────────────────────────────────────────────── */}}
{{- $img := .Values.images.override }}
{{- if not $img }}
  {{- $img = ternary .Values.images.gpu .Values.images.cpu $isGPU }}
{{- end }}

{{- /* ── Hardware profile auto-selection ───────────────────────────────────── */}}
{{- $hwProfile := .Values.hardwareProfile.name }}
{{- if not $hwProfile }}
  {{- $hwProfile = ternary "gpu-profile" "default-cpu" $isGPU }}
{{- end }}

{{- /* ── Auth: MaaS always requires auth ──────────────────────────────────── */}}
{{- $enableAuth := .Values.enableAuth | default false }}
{{- if .Values.maas.enabled }}
  {{- $enableAuth = true }}
{{- end }}

{{- /* ── Env vars: CPU defaults + vllmAdditionalArgs + user extras ────────── */}}
{{- $envVars := .Values.env | default list }}
{{- if not $isGPU }}
  {{- if .Values.cpu.kvCacheSpaceGiB }}
    {{- $envVars = prepend $envVars (dict "name" "VLLM_CPU_KVCACHE_SPACE" "value" (.Values.cpu.kvCacheSpaceGiB | toString)) }}
  {{- end }}
  {{- if .Values.cpu.skipWarmup }}
    {{- $envVars = prepend $envVars (dict "name" "VLLM_SKIP_WARMUP" "value" "true") }}
  {{- end }}
{{- end }}
{{- if .Values.vllmAdditionalArgs }}
  {{- $envVars = append $envVars (dict "name" "VLLM_ADDITIONAL_ARGS" "value" .Values.vllmAdditionalArgs) }}
{{- end }}

---
apiVersion: serving.kserve.io/v1alpha2
kind: LLMInferenceService
metadata:
  name: {{ .Values.serviceName }}
  annotations:
    opendatahub.io/model-type: generative
    openshift.io/display-name: "{{ .Values.serviceName }}"
    security.opendatahub.io/enable-auth: "{{ $enableAuth }}"
    opendatahub.io/hardware-profile-namespace: {{ .Values.hardwareProfile.namespace }}
    opendatahub.io/hardware-profile-name: {{ $hwProfile }}
    {{- if eq .Values.storage.type "oci" }}
    opendatahub.io/connections: {{ .Values.serviceName }}-connection
    {{- end }}
  labels:
    networking.kserve.io/visibility: exposed
    opendatahub.io/dashboard: "true"
    opendatahub.io/genai-asset: "true"
    monitoring.opendatahub.io/scrape: "true"
spec:
  replicas: {{ .Values.replicas }}
  model:
    uri: {{ .Values.storage.uri }}
    name: {{ .Values.model.name }}
  router:
    gateway:
      {{- if and .Values.maas.enabled .Values.maas.gateway.name }}
      refs:
        - name: {{ .Values.maas.gateway.name }}
          namespace: {{ .Values.maas.gateway.namespace }}
      {{- end }}
    route: {}
    {{- if .Values.intelligentInferenceSimple }}
    scheduler: {}
    {{- else }}
    scheduler:
      template:
        {{- if and .Values.schedulerTLS.enabled .Values.schedulerTLS.secretName }}
        volumes:
          - name: epp-tls
            secret:
              secretName: {{ .Values.schedulerTLS.secretName }}
        {{- end }}
        containers:
          - name: main
            {{- if and .Values.schedulerTLS.enabled .Values.schedulerTLS.secretName }}
            volumeMounts:
              - name: epp-tls
                mountPath: {{ .Values.schedulerTLS.mountPath }}
                readOnly: true
            {{- end }}
            args:
              - -v=4
              - --pool-name
              - "{{ "{{" }} ChildName .ObjectMeta.Name `-inference-pool` {{ "}}" }}"
              - --pool-namespace
              - "{{ "{{" }} .ObjectMeta.Namespace {{ "}}" }}"
              - --zap-encoder
              - json
              - --grpc-port
              - "9002"
              - --grpc-health-port
              - "9003"
              - --secure-serving
              - --model-server-metrics-scheme
              - https
              - --model-server-metrics-https-insecure-skip-verify
              {{- if and .Values.schedulerTLS.enabled .Values.schedulerTLS.secretName }}
              - --cert-path
              - {{ .Values.schedulerTLS.mountPath | quote }}
              {{- end }}
              - --config-text
              - |2

                apiVersion: inference.networking.x-k8s.io/v1alpha1
                kind: EndpointPickerConfig
                plugins:
                - type: single-profile-handler
                - type: max-score-picker
                - type: queue-scorer
                - type: kv-cache-utilization-scorer
                - type: prefix-cache-scorer
                  parameters:
                    hashBlockSize: {{ .Values.scheduler.hashBlockSize }}
                    maxPrefixBlocksToMatch: {{ .Values.scheduler.maxPrefixBlocksToMatch }}
                    lruCapacityPerServer: {{ .Values.scheduler.lruCapacityPerServer }}
                schedulingProfiles:
                - name: default
                  plugins:
                    - pluginRef: prefix-cache-scorer
                      weight: 2.0
                    - pluginRef: queue-scorer
                      weight: 1.0
                    - pluginRef: kv-cache-utilization-scorer
                      weight: 1.0
                    - pluginRef: max-score-picker
    {{- end }}
  template:
    {{- if $isGPU }}
    tolerations:
      - key: "nvidia.com/gpu"
        operator: "Exists"
        effect: "NoSchedule"
    {{- end }}
    {{- if and .Values.storage.pvc .Values.storage.pvc.size }}
    volumes:
      - name: kserve-provision-location
        persistentVolumeClaim:
          claimName: {{ .Values.serviceName }}
    {{- end }}
    containers:
      - name: main
        image: {{ $img }}
        {{- if $envVars }}
        env:
          {{- toYaml $envVars | nindent 10 }}
        {{- end }}
        resources:
          limits:
            cpu: {{ .Values.resources.limits.cpu | quote }}
            memory: {{ .Values.resources.limits.memory }}
            {{- if .Values.resources.limits.gpuCount }}
            nvidia.com/gpu: {{ .Values.resources.limits.gpuCount | quote }}
            {{- end }}
          requests:
            cpu: {{ .Values.resources.requests.cpu | quote }}
            memory: {{ .Values.resources.requests.memory }}
            {{- if .Values.resources.requests.gpuCount }}
            nvidia.com/gpu: {{ .Values.resources.requests.gpuCount | quote }}
            {{- end }}
        {{- if or (and .Values.intelligentInferenceSimple .Values.useStartupProbe) (eq .Values.updateStrategy "Recreate") }}
        strategy:
          type: Recreate
        {{- end }}
        {{- if and .Values.intelligentInferenceSimple .Values.useStartupProbe }}
        livenessProbe:
          initialDelaySeconds: 10
        startupProbe:
          httpGet:
            path: {{ .Values.livenessProbe.path }}
            port: {{ .Values.mainStartupProbePort }}
            scheme: HTTPS
          initialDelaySeconds: {{ .Values.startupProbe.initialDelaySeconds }}
          timeoutSeconds: {{ .Values.startupProbe.timeoutSeconds }}
          periodSeconds: {{ .Values.startupProbe.periodSeconds }}
          failureThreshold: {{ .Values.startupProbe.failureThreshold }}
        {{- else }}
        livenessProbe:
          httpGet:
            path: {{ .Values.livenessProbe.path }}
            port: {{ .Values.livenessProbe.port }}
            scheme: HTTPS
          initialDelaySeconds: {{ .Values.livenessProbe.initialDelaySeconds }}
          periodSeconds: {{ .Values.livenessProbe.periodSeconds }}
          timeoutSeconds: {{ .Values.livenessProbe.timeoutSeconds }}
          failureThreshold: {{ .Values.livenessProbe.failureThreshold }}
        {{- end }}
{{- end }}
