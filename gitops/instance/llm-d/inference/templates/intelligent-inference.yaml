{{- include "inference.validateDeploymentType" . }}
{{- include "inference.validateStorageType" . }}

{{- if eq .Values.deploymentType "intelligent-inference" }}
{{- if not .Values.storage }}
{{- fail "intelligent-inference requires values.storage to be set" }}
{{- end }}
{{- if not .Values.storage.uri }}
{{- fail "intelligent-inference requires values.storage.uri to be set" }}
{{- end }}
---
apiVersion: serving.kserve.io/v1alpha1
kind: LLMInferenceService
metadata:
  name: {{ .Values.serviceName }}
  annotations:
    opendatahub.io/model-type: generative
    openshift.io/display-name: "{{ .Values.serviceName }}"
    security.opendatahub.io/enable-auth: '{{ default false .Values.enableAuth }}'
    opendatahub.io/hardware-profile-namespace: redhat-ods-applications
    opendatahub.io/hardware-profile-name: gpu-profile
  {{- if eq .Values.storage.type "oci" }}
    opendatahub.io/connections: {{ .Values.serviceName }}-connection
  {{- end }}
  labels:
    networking.kserve.io/visibility: exposed
    opendatahub.io/dashboard: "true"
    opendatahub.io/genai-asset: "true"
    monitoring.opendatahub.io/scrape: "true"
spec:
  replicas: {{ .Values.replicas }}
  model:
    uri: {{ .Values.storage.uri }}
    name: {{ .Values.model.name }}
  router:
    gateway: {}
    route: {}
    {{- if .Values.intelligentInferenceSimple }}
    scheduler: {}
    {{- else }}
    scheduler:
      template:
        {{- if and .Values.schedulerTLS.enabled .Values.schedulerTLS.secretName }}
        volumes:
          - name: epp-tls
            secret:
              secretName: {{ .Values.schedulerTLS.secretName }}
        {{- end }}
        containers:
          - name: main
            {{- if and .Values.schedulerTLS.enabled .Values.schedulerTLS.secretName }}
            volumeMounts:
              - name: epp-tls
                mountPath: {{ .Values.schedulerTLS.mountPath }}
                readOnly: true
            {{- end }}
            args:
              - -v=4
              - --pool-name
              - "{{ "{{" }} ChildName .ObjectMeta.Name `-inference-pool` {{ "}}" }}"
              - --pool-namespace
              - "{{ "{{" }} .ObjectMeta.Namespace {{ "}}" }}"
              - --zap-encoder
              - json
              - --grpc-port
              - "9002"
              - --grpc-health-port
              - "9003"
              - --secure-serving
              - --model-server-metrics-scheme
              - https
              - --model-server-metrics-https-insecure-skip-verify
              {{- if and .Values.schedulerTLS.enabled .Values.schedulerTLS.secretName }}
              - --cert-path
              - {{ .Values.schedulerTLS.mountPath | quote }}
              {{- end }}
              - --config-text
              - |2

                apiVersion: inference.networking.x-k8s.io/v1alpha1
                kind: EndpointPickerConfig
                plugins:
                - type: single-profile-handler
                - type: max-score-picker
                - type: queue-scorer
                - type: kv-cache-utilization-scorer
                - type: prefix-cache-scorer
                  parameters:
                    hashBlockSize: {{ .Values.scheduler.hashBlockSize }}             # block size 16 * 4 chars / token
                    maxPrefixBlocksToMatch: {{ .Values.scheduler.maxPrefixBlocksToMatch }}   # this matches up to ~4k tokens
                    lruCapacityPerServer: {{ .Values.scheduler.lruCapacityPerServer }}   # total blocks (635904) / block size (16)
                schedulingProfiles:
                - name: default
                  plugins:
                    - pluginRef: prefix-cache-scorer
                      weight: 2.0
                    - pluginRef: queue-scorer
                      weight: 1.0
                    - pluginRef: kv-cache-utilization-scorer
                      weight: 1.0
                    - pluginRef: max-score-picker
    {{- end }}
  template:
    tolerations:
      - key: "nvidia.com/gpu"
        operator: "Exists"
        effect: "NoSchedule"
    {{- if and .Values.storage.pvc .Values.storage.pvc.size }}
    volumes:
      - name: kserve-provision-location
        persistentVolumeClaim:
          claimName: {{ .Values.serviceName }}
    {{- end }}
    containers:
      - name: main
        {{- if .Values.env }}
        env:
          {{- toYaml .Values.env | nindent 10 }}
        {{- end }}
        resources:
          limits:
            cpu: {{ .Values.resources.limits.cpu | quote }}
            memory: {{ .Values.resources.limits.memory }}
            {{- if .Values.resources.limits.gpuCount }}
            nvidia.com/gpu: {{ .Values.resources.limits.gpuCount | quote }}
            {{- end }}
          requests:
            cpu: {{ .Values.resources.requests.cpu | quote }}
            memory: {{ .Values.resources.requests.memory }}
            {{- if .Values.resources.requests.gpuCount }}
            nvidia.com/gpu: {{ .Values.resources.requests.gpuCount | quote }}
            {{- end }}
        {{- if and .Values.intelligentInferenceSimple .Values.useStartupProbe }}
        livenessProbe:
          initialDelaySeconds: 10
        startupProbe:
          httpGet:
            path: {{ .Values.livenessProbe.path }}
            port: {{ .Values.mainStartupProbePort }}
            scheme: HTTPS
          initialDelaySeconds: {{ .Values.startupProbe.initialDelaySeconds }}
          timeoutSeconds: {{ .Values.startupProbe.timeoutSeconds }}
          periodSeconds: {{ .Values.startupProbe.periodSeconds }}
          failureThreshold: {{ .Values.startupProbe.failureThreshold }}
        {{- else }}
        livenessProbe:
          httpGet:
            path: {{ .Values.livenessProbe.path }}
            port: {{ .Values.livenessProbe.port }}
            scheme: HTTPS
          initialDelaySeconds: {{ .Values.livenessProbe.initialDelaySeconds }}
          periodSeconds: {{ .Values.livenessProbe.periodSeconds }}
          timeoutSeconds: {{ .Values.livenessProbe.timeoutSeconds }}
          failureThreshold: {{ .Values.livenessProbe.failureThreshold }}
        {{- end }}
{{- end }}
