{{- if and .Values.storage .Values.storage.pvc .Values.storage.pvc.size }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Values.serviceName }}
spec:
  accessModes:
    - {{ .Values.storage.pvc.accessMode | default "ReadWriteOnce" }}
  volumeMode: Filesystem
  {{- if .Values.storage.pvc.storageClassName }}
  storageClassName: {{ .Values.storage.pvc.storageClassName }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.storage.pvc.size | default "40Gi" }}
      
{{- end }}