{{- if eq .Values.storage.type "oci" }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.serviceName }}-connection
  labels:
    opendatahub.io/dashboard: 'true'
  annotations:
    opendatahub.io/connection-type-protocol: uri
    opendatahub.io/connection-type-ref: uri-v1
    openshift.io/display-name: {{ .Values.serviceName }}-connection
stringData:
  URI: {{ .Values.storage.uri }}
type: Opaque
{{- end }}